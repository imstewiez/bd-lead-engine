<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BD Lead Engine</title>
    <link rel="stylesheet" href="/styles.css?v=clean-3" />
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/app.js?v=clean-5"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Sales intelligence</p>
          <h1>BD Lead Engine</h1>
        </div>
      </header>

      <main class="auto-workspace">
        <section class="main-panel hero-panel">
          <div class="hero-row">
            <div>
              <p class="eyebrow">Pipeline ativo</p>
              <h2>Leads qualificadas para outbound.</h2>
              <p id="runMessage" class="hero-copy">A procurar e enriquecer oportunidades automaticamente.</p>
            </div>
            <span id="runBadge" class="badge muted">Ativo</span>
          </div>
          <div class="progress-track hero-progress"><div id="progressBar" class="progress-bar"></div></div>
          <div id="systemHealth" class="health-strip"></div>
          <div class="event-list compact" id="eventList"></div>
        </section>

        <section class="main-panel">
          <div class="metric-strip">
            <div class="metric"><span id="metricTotalLabel">Qualified</span><strong id="metricTotal">0</strong></div>
            <div class="metric raw"><span>Guardadas</span><strong id="metricRawTotal">0</strong></div>
            <div class="metric hot"><span>A leads</span><strong id="metricA">0</strong></div>
            <div class="metric"><span>Parceiros</span><strong id="metricPartners">0</strong></div>
            <div class="metric"><span>Recruta</span><strong id="metricRecruitment">0</strong></div>
            <div class="metric booked"><span>Reuniões</span><strong id="metricBooked">0</strong></div>
            <div class="metric contact"><span>Contactáveis</span><strong id="metricContactable">0</strong></div>
            <div class="metric"><span>Contacto</span><strong id="metricEmailForm">0</strong></div>
          </div>

          <div class="toolbar single-search">
            <div class="search-box"><i data-lucide="search"></i><input id="searchInput" placeholder="Pesquisar leads qualificadas..." /></div>
          </div>

          <div class="source-strip" id="platformStrip"></div>

          <div class="split-view">
            <div class="lead-table-wrap">
              <table class="lead-table">
                <thead><tr><th>Lead</th><th>Origem</th><th>Tipo</th><th>Nota</th><th>País</th><th>Estado</th></tr></thead>
                <tbody id="leadRows"></tbody>
              </table>
            </div>
            <aside class="detail-panel" id="detailPanel"><div class="empty-state"><i data-lucide="target"></i><p>Seleciona uma lead.</p></div></aside>
          </div>
        </section>
      </main>

      <div style="display:none">
        <aside class="control-panel">
          <select id="regionSet"><option value="global">Global</option></select>
          <input id="maxQueries" value="260" />
          <input id="limitPerQuery" value="15" />
          <input id="includePartners" type="checkbox" checked />
          <input id="includeRecruitment" type="checkbox" checked />
          <input id="fetchPages" type="checkbox" checked />
          <input id="deepEnrich" type="checkbox" checked />
          <button id="scanButton">scan</button>
          <button id="continuousButton">continuous</button>
          <button id="stopButton">stop</button>
          <select id="viewModeFilter"><option value="qualified">Qualified</option></select>
          <select id="platformFilter"><option value=""></option></select>
          <select id="priorityFilter"><option value=""></option></select>
          <select id="typeFilter"><option value=""></option></select>
          <select id="stageFilter"><option value=""></option></select>
        </aside>
      </div>
    </div>
  </body>
</html>

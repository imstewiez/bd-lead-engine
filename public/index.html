<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1720" />
    <title>BD Lead Engine</title>
    <link rel="stylesheet" href="/styles.css?v=auto-inbox-1" />
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/app.js?v=auto-inbox-1"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <div class="brand-mark">BD</div>
          <div>
            <p class="eyebrow">Lead operations</p>
            <h1>BD Lead Engine</h1>
          </div>
        </div>
        <div class="topbar-status">
          <span id="runBadge" class="status-pill muted">Auto sourcing</span>
          <span id="lastUpdated" class="status-pill">sync —</span>
        </div>
      </header>

      <main class="crm-shell">
        <section class="overview-strip" aria-label="Resumo automático">
          <div class="metric raw"><span>Base</span><strong id="metricRawTotal">0</strong></div>
          <div class="metric hot"><span id="metricTotalLabel">Qualificadas</span><strong id="metricTotal">0</strong></div>
          <div class="metric contact"><span>Contactáveis</span><strong id="metricContactable">0</strong></div>
          <div class="metric"><span>A leads</span><strong id="metricA">0</strong></div>
          <div class="metric"><span>Parceiros</span><strong id="metricPartners">0</strong></div>
          <div class="metric booked"><span>Reuniões</span><strong id="metricBooked">0</strong></div>
          <div class="metric hidden-metric"><span>Recruta</span><strong id="metricRecruitment">0</strong></div>
          <div class="metric hidden-metric"><span>Contacto</span><strong id="metricEmailForm">0</strong></div>
          <div class="engine-panel">
            <div class="run-line"><strong>Engine</strong><span id="runMessage">Automático quando o host está ligado.</span></div>
            <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
            <div id="systemHealth" class="health-strip"></div>
            <div id="eventList" class="event-list"></div>
          </div>
        </section>

        <section class="work-grid">
          <section class="lead-workspace">
            <div class="workspace-header">
              <div>
                <p class="eyebrow">Lead inbox</p>
                <h2>Leads qualificadas</h2>
              </div>
              <div class="workspace-tools">
                <div class="search-box">
                  <i data-lucide="search"></i>
                  <input id="searchInput" placeholder="Pesquisar lead, país, fonte, segmento..." autocomplete="off" />
                </div>
                <div class="filter-row">
                  <select id="viewModeFilter" aria-label="Vista"><option value="qualified">Qualified</option><option value="raw">Raw base</option></select>
                  <select id="priorityFilter" aria-label="Prioridade"><option value="">Prioridade</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select>
                  <select id="typeFilter" aria-label="Tipo"><option value="">Tipo</option><option value="partner">Parceiro</option><option value="institution">Instituição</option><option value="recruitment">Recruta</option><option value="research">Pesquisa</option></select>
                  <select id="stageFilter" aria-label="Estado"><option value="">Estado</option><option value="new">Novo</option><option value="contacted">Contactado</option><option value="replied">Respondeu</option><option value="meeting_booked">Reunião</option><option value="no_show">No-show</option><option value="negotiating">Negociação</option><option value="won">Ganho</option><option value="lost">Perdido</option></select>
                  <select id="platformFilter" class="visually-hidden" aria-label="Fonte"><option value=""></option></select>
                </div>
              </div>
            </div>
            <div class="source-strip" id="platformStrip"></div>
            <div class="lead-table-shell" id="leadRows"></div>
          </section>

          <aside class="detail-panel" id="detailPanel">
            <div class="empty-state">
              <i data-lucide="mouse-pointer-2"></i>
              <p>Seleciona uma lead para abrir o dossiê comercial.</p>
            </div>
          </aside>
        </section>
      </main>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </div>
  </body>
</html>

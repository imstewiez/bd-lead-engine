<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BD Lead Engine</title>
    <link rel="stylesheet" href="/styles.css?v=clean-3" />
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="/app.js?v=clean-4"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Sales intelligence</p>
          <h1>BD Lead Engine</h1>
        </div>
      </header>

      <main class="auto-workspace">
        <section class="main-panel hero-panel">
          <div class="hero-row">
            <div>
              <p class="eyebrow">Pipeline ativo</p>
              <h2>Leads qualificadas para outbound.</h2>
              <p id="runMessage" class="hero-copy">A procurar e enriquecer oportunidades automaticamente.</p>
            </div>
            <span id="runBadge" class="badge muted">Ativo</span>
          </div>
          <div class="progress-track hero-progress"><div id="progressBar" class="progress-bar"></div></div>
          <div id="systemHealth" class="system-health"></div>
        </section>

        <section class="metrics-grid">
          <article class="metric-card"><span id="metricTotalLabel">Qualificadas</span><strong id="metricTotal">0</strong></article>
          <article class="metric-card"><span>Total DB</span><strong id="metricRawTotal">0</strong></article>
          <article class="metric-card"><span>A/B quentes</span><strong id="metricA">0</strong></article>
          <article class="metric-card"><span>Contactáveis</span><strong id="metricContactable">0</strong></article>
          <article class="metric-card"><span>Email/Form</span><strong id="metricEmailForm">0</strong></article>
          <article class="metric-card"><span>Reuniões</span><strong id="metricBooked">0</strong></article>
        </section>

        <section class="main-panel controls-panel">
          <div class="control-grid">
            <label class="field"><span>Região</span><select id="regionSet"><option value="global">Global</option><option value="latam">LATAM</option><option value="brazil">Brazil</option><option value="europe">Europe</option><option value="mena">MENA</option></select></label>
            <label class="field"><span>Queries</span><input id="maxQueries" type="number" value="120" min="1" max="400" /></label>
            <label class="field"><span>Resultados/query</span><input id="limitPerQuery" type="number" value="10" min="1" max="25" /></label>
            <label class="check"><input id="includePartners" type="checkbox" checked /> Parceiros</label>
            <label class="check"><input id="includeRecruitment" type="checkbox" checked /> Recruta</label>
            <label class="check"><input id="fetchPages" type="checkbox" checked /> Enriquecer páginas</label>
            <label class="check"><input id="deepEnrich" type="checkbox" checked /> Deep search</label>
          </div>
          <div class="actions-row">
            <button id="scanButton" class="primary-button">Scan agora</button>
            <button id="continuousButton" class="secondary-button">Autopilot</button>
            <button id="stopButton" class="secondary-button danger">Parar</button>
          </div>
          <div id="eventList" class="event-list"></div>
        </section>

        <section class="main-panel filter-panel">
          <div id="platformStrip" class="platform-strip"></div>
          <div class="filters-row">
            <input id="searchInput" placeholder="Pesquisar lead, país, segmento..." />
            <select id="viewModeFilter"><option value="qualified">Worklist</option><option value="raw">Raw DB</option></select>
            <select id="platformFilter"><option value="">Fonte</option><option value="non-mql5">Non-MQL5</option><option value="social">Social/DM</option><option value="linkedin">LinkedIn</option><option value="instagram">Instagram</option><option value="myfxbook">Myfxbook</option><option value="mql5">MQL5</option></select>
            <select id="priorityFilter"><option value="">Prioridade</option><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
            <select id="typeFilter"><option value="">Tipo</option><option value="partner">Parceiro</option><option value="recruitment">Recruta</option><option value="institution">Instituição</option></select>
            <select id="stageFilter"><option value="">Estado</option><option value="new">Novo</option><option value="contacted">Contactado</option><option value="meeting_booked">Reunião</option><option value="won">Ganho</option><option value="lost">Perdido</option></select>
          </div>
        </section>

        <section class="workbench">
          <div class="main-panel table-panel">
            <table>
              <thead><tr><th>Lead</th><th>Fonte</th><th>Tipo</th><th>Score</th><th>País</th><th>Estado</th></tr></thead>
              <tbody id="leadRows"></tbody>
            </table>
          </div>
          <aside id="detailPanel" class="main-panel detail-panel"></aside>
        </section>
      </main>
    </div>
  </body>
</html>
